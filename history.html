<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08060D">
<title>History — KrazyBuy</title>
<link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
<link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap)" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toastArea" aria-live="polite"></div>
<div class="overlay" id="overlay"></div>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <header class="top">
      <div class="top-q">
        <button class="burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
        <span>Search History</span>
      </div>
      <button class="btn btn-danger" id="clearBtn" style="padding:7px 16px;font-size:12px">Clear All</button>
    </header>

    <div class="thread">
      <div class="content">
        <div class="section-title">
          <span class="sec-dot" style="background:var(--blue)"></span>
          Your Analyses
          <span class="sec-count" id="histCount">0</span>
        </div>
        <div class="hist-list" id="histList"></div>
        <div class="state" id="histEmpty" style="display:none">
          <div class="state-ic">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
          </div>
          <h3>No history yet</h3>
          <p>Every product you analyze will show up here so you can re-run it anytime.</p>
          <a class="btn btn-primary" href="index.html">Start Searching</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
(() => {
'use strict';
const { $, esc, fmtPrice, timeAgo, toast, getHist, removeHist, clearHist, mountSidebar } = KB;

mountSidebar('history');

function render(){
  const hist=getHist();
  $('#histCount').textContent=hist.length;
  const list=$('#histList');
  if(!hist.length){ list.innerHTML=''; $('#histEmpty').style.display=''; return; }
  $('#histEmpty').style.display='none';

  list.innerHTML=hist.map((h,i)=>`
    <div class="hist-item" style="animation-delay:${Math.min(i,10)*45}ms">
      <div class="hist-ic">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div class="hist-q">${esc(h.q)}</div>
        <div class="hist-meta">
          <span>${timeAgo(h.ts)}</span>
          ${h.products?`<span>${h.products} products</span>`:''}
          ${h.low?`<span class="hist-low">Lowest: ${fmtPrice(h.low)}</span>`:''}
        </div>
      </div>
      <div class="hist-acts">
        <a class="hist-run" href="index.html?q=${encodeURIComponent(h.q)}">Re-analyze</a>
        <button class="hist-del" data-q="${esc(h.q)}" aria-label="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>`).join('');

  list.querySelectorAll('.hist-del').forEach(b=>b.addEventListener('click',()=>{
    removeHist(b.dataset.q);
    toast('info','Removed from history');
    render();
  }));
}

$('#clearBtn').addEventListener('click',()=>{
  if(!getHist().length) return toast('info','History is already empty');
  clearHist();
  toast('success','History cleared');
  render();
});

render();
})();
</script>
</body>
</html>
